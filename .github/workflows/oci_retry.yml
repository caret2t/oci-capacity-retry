name: OCI Capacity Retry

on:
  repository_dispatch:
    types: [retry_oci_apply]
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Setup OCI CLI
        uses: oracle-actions/setup-oci-cli@v1
        with:
          user: ${{ secrets.OCI_USER_OCID }}
          tenancy: ${{ secrets.OCI_TENANCY_OCID }}
          fingerprint: ${{ secrets.OCI_FINGERPRINT }}
          region: ${{ secrets.OCI_REGION }}
          api_key: ${{ secrets.OCI_KEY_FILE }}

      - name: Run Stack Apply
        id: oci_apply
        run: |
          STACK_ID="${{ secrets.OCI_STACK_ID }}"
          
          RESULT=$(oci resource-manager job create-apply-job \
            --stack-id $STACK_ID \
            --execution-plan-strategy AUTO_APPROVED \
            --query 'data.lifecycle-state' \
            --raw-output 2>&1)
          
          echo "結果: $RESULT"
          
          if echo "$RESULT" | grep -q "SUCCEEDED"; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
          
          # 容量不足でも失敗扱いにしない
          exit 0

      - name: Send Email on Success
        if: steps.oci_apply.outputs.success == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "【祝】OCI A1インスタンスの確保に成功しました！"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions OCI Bot
          body: |
            おめでとうございます！
            OCIのAmpere A1インスタンスの作成に成功しました。
            
            スタックの実行が完了しましたので、OCIコンソールからインスタンスの状態を確認してください。
            https://cloud.oracle.com/compute/instances
