name: OCI Capacity Retry

on:
  repository_dispatch:
    types: [retry_oci_apply]
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: bash -c "$(curl -L https://raw.githubusercontent.com/oracle/oci-cli/master/scripts/install/install.sh)" -- --accept-all-defaults

      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          region=${{ secrets.OCI_REGION }}
          key_file=~/.oci/oci_api_key.pem" > ~/.oci/config
          echo "${{ secrets.OCI_KEY_FILE }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Run Stack Apply
        id: oci_apply
        run: |
          RESULT=$(~/bin/oci resource-manager job create-apply-job \
            --stack-id ${{ secrets.OCI_STACK_ID }} \
            --execution-plan-strategy AUTO_APPROVED \
            --query 'data.lifecycle-state' \
            --raw-output 2>&1)
          echo "結果: $RESULT"
          if echo "$RESULT" | grep -q "SUCCEEDED"; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi
          exit 0

      - name: Send Email on Success
        if: steps.oci_apply.outputs.success == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "【祝】OCI A1インスタンスの確保に成功しました！"
          to: ${{ secrets.MAIL_USERNAME }}
          from: GitHub Actions OCI Bot
          body: |
            おめでとうございます！A1確保成功です！
            https://cloud.oracle.com/compute/instances
